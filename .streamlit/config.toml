# Cafe Manager — Theme
# This file controls the entire visual style of the app: colors, fonts,
# corner roundness, and borders. Streamlit reads this automatically —
# there is no separate "settings page" to click through.

[theme]
# ---- Colors (main content area: light) ----
primaryColor = "#F2722D"            # Accent color (buttons, focus, links) — vibrant orange
backgroundColor = "#FFFFFF"         # Main app background — clean white
secondaryBackgroundColor = "#F4F5F6" # Card/widget backgrounds — soft off-white gray
textColor = "#16181D"               # Body text — near-black for strong title contrast
linkColor = "#F2722D"

# ---- Typography ----
font = "sans-serif"
headingFont = "sans-serif"
baseFontSize = 16

# ---- Shape & borders ----
baseRadius = "medium"       # Rounded corners on cards, inputs, dataframes
buttonRadius = "medium"
borderColor = "#E3E6E8"     # Thin light border for cards in the main content area
showWidgetBorder = true
showSidebarBorder = true

# ---- Sidebar (dark, independent of the main theme) ----
[theme.sidebar]
backgroundColor = "#1B1E24"   # Deep charcoal — dark, not pure black
secondaryBackgroundColor = "#23262D"
textColor = "#E7E9EC"         # Off-white nav text
borderColor = "#2E323A"       # Subtle dark border between sidebar and content
