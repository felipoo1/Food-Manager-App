# Cafe Manager — Theme
# This file controls the entire visual style of the app: colors, fonts,
# corner roundness, and borders. Streamlit reads this automatically —
# there is no separate "settings page" to click through.

[theme]
# ---- Colors ----
primaryColor = "#0F766E"            # Accent color (buttons, focus, links) — clean teal
backgroundColor = "#FFFFFF"         # Main app background — clean white
secondaryBackgroundColor = "#F6F7F8" # Sidebar & card backgrounds — soft neutral gray
textColor = "#1F2933"               # Body text — near-black slate, not pure black
linkColor = "#0F766E"               # Links match the accent color

# ---- Typography ----
font = "sans-serif"        # Body text — Source Sans
headingFont = "sans-serif" # Headings — same family as body, for a clean unified look
baseFontSize = 16          # Standard, compact, efficient for a dashboard

# ---- Shape & borders ----
baseRadius = "small"       # Crisp, minimal corner rounding — professional, not playful
buttonRadius = "medium"    # Buttons slightly more rounded than cards/inputs
borderColor = "#E3E6E8"    # Light neutral border color
showWidgetBorder = true    # Subtle border on input fields even when not focused
showSidebarBorder = true   # Clean vertical line between sidebar and main content

[theme.sidebar]
backgroundColor = "#FFFFFF"
borderColor = "#E3E6E8"
